name: Perform Mixeway Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mixeway-scan:
    name: Mixeway Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1

      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare Mixeway docker image
        run: |
          docker pull mixeway/scanner:latest

      - name: Run Scan
        run: |
          docker run --rm \
            -e OSS_USERNAME="${{ secrets.OSS_USERNAME }}" \
            -e OSS_KEY="${{ secrets.OSS_KEY }}" \
            -e MIXEWAY_URL="https://flow.mixeway.io" \
            -e MIXEWAY_KEY="${{ secrets.MIXEWAY_KEY }}" \
            -e MIXEWAY_PROJECT_ID="${{ secrets.MIXEWAY_PROJECT_ID }}" \
            -e MODE="STANDALONE" \
            -e MIXEWAY_PROJECT_NAME="${{ github.event.repository.name }}" \
            -e COMMIT_ID="${{ steps.vars.outputs.sha_short }}" \
            -e BRANCH="${{ steps.vars.outputs.branch }}" \
            -v "${{ github.workspace }}:/opt/sources" \
            mixeway/scanner:latest
